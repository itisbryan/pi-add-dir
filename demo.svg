<svg xmlns="http://www.w3.org/2000/svg" width="820" height="580" viewBox="0 0 820 580">
  <style>
    text { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; font-size: 13px; }
    .dim { fill: #6b7280; }
    .text { fill: #e5e7eb; }
    .accent { fill: #60a5fa; }
    .green { fill: #34d399; }
    .yellow { fill: #fbbf24; }
    .muted { fill: #9ca3af; }
    .cyan { fill: #22d3ee; }
    .bold { font-weight: bold; }
    .title { font-size: 13px; font-weight: bold; }
    .select-bg { fill: #283457; }
  </style>

  <!-- Window chrome -->
  <rect width="820" height="580" rx="10" fill="#1a1b26"/>
  <rect width="820" height="36" rx="10" fill="#24283b"/>
  <rect y="26" width="820" height="10" fill="#24283b"/>
  <circle cx="20" cy="18" r="6" fill="#f7768e"/>
  <circle cx="40" cy="18" r="6" fill="#e0af68"/>
  <circle cx="60" cy="18" r="6" fill="#9ece6a"/>
  <text x="410" y="22" text-anchor="middle" class="muted title">pi — ~/monorepo/apps/web</text>

  <!-- Widget bar -->
  <rect x="0" y="36" width="820" height="28" fill="#1e2030"/>
  <text x="14" y="55" class="text">📂</text>
  <text x="34" y="55" class="muted"> 1 external dir</text>
  <text x="155" y="55" class="dim"> │ </text>
  <text x="173" y="55" class="text">shared-utils</text>
  <text x="280" y="55" class="dim">  (/dirs to manage)</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Scene 1: /add-dir with smart suggestions picker               -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <text x="14" y="88" class="accent bold">❯</text>
  <text x="28" y="88" class="cyan">/add-dir</text>

  <!-- Picker label -->
  <text x="14" y="112" class="muted">Add directory:</text>

  <!-- Suggestion 1 — highlighted row -->
  <rect x="10" y="120" width="790" height="20" rx="3" class="select-bg"/>
  <text x="18" y="135" class="accent bold">❯ </text>
  <text x="34" y="135" class="green">packages/ui</text>
  <text x="125" y="135" class="dim"> — </text>
  <text x="143" y="135" class="muted">/Users/me/monorepo/packages/ui</text>
  <text x="450" y="135" class="dim"> (</text>
  <text x="458" y="135" class="yellow">workspace member, has AGENTS.md</text>
  <text x="705" y="135" class="dim">)</text>

  <!-- Suggestion 2 -->
  <text x="34" y="157" class="text">packages/shared</text>
  <text x="160" y="157" class="dim"> — </text>
  <text x="178" y="157" class="muted">/Users/me/monorepo/packages/shared</text>
  <text x="490" y="157" class="dim"> (</text>
  <text x="498" y="157" class="yellow">workspace member, has CLAUDE.md</text>
  <text x="745" y="157" class="dim">)</text>

  <!-- Suggestion 3 -->
  <text x="34" y="177" class="text">apps/api</text>
  <text x="105" y="177" class="dim"> — </text>
  <text x="123" y="177" class="muted">/Users/me/monorepo/apps/api</text>
  <text x="392" y="177" class="dim"> (</text>
  <text x="400" y="177" class="yellow">workspace member</text>
  <text x="530" y="177" class="dim">)</text>

  <!-- Custom path option -->
  <text x="34" y="197" class="muted">📝 Enter a custom path...</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Scene 2: /suggest-dirs output                                  -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <text x="14" y="232" class="accent bold">❯</text>
  <text x="28" y="232" class="cyan">/suggest-dirs</text>

  <text x="14" y="256" class="muted">Suggested directories (3):</text>

  <text x="14" y="280" class="text">  📂 </text>
  <text x="48" y="280" class="accent bold">packages/ui</text>
  <text x="152" y="280" class="dim">  (</text>
  <text x="162" y="280" class="green">90%</text>
  <text x="190" y="280" class="dim"> relevance)</text>
  <text x="14" y="298" class="dim">     /Users/me/monorepo/packages/ui</text>
  <text x="14" y="316" class="text">     </text>
  <text x="48" y="316" class="yellow">workspace member</text>
  <text x="186" y="316" class="dim">, </text>
  <text x="196" y="316" class="yellow">has AGENTS.md</text>
  <text x="315" y="316" class="dim">, </text>
  <text x="325" y="316" class="yellow">has skills</text>

  <text x="14" y="344" class="text">  📂 </text>
  <text x="48" y="344" class="accent bold">packages/shared</text>
  <text x="182" y="344" class="dim">  (</text>
  <text x="192" y="344" class="green">75%</text>
  <text x="220" y="344" class="dim"> relevance)</text>
  <text x="14" y="362" class="dim">     /Users/me/monorepo/packages/shared</text>
  <text x="14" y="380" class="text">     </text>
  <text x="48" y="380" class="yellow">workspace member</text>
  <text x="186" y="380" class="dim">, </text>
  <text x="196" y="380" class="yellow">has CLAUDE.md</text>

  <text x="14" y="404" class="muted">  Use /add-dir to pick one, or /add-dir &lt;path&gt; to add directly.</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Scene 3: Agent autonomously using add_directory tool           -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <text x="14" y="438" class="accent bold">❯</text>
  <text x="28" y="438" class="text"> I need to reference the auth service</text>

  <text x="14" y="468" class="dim">  ┌ </text>
  <text x="40" y="468" class="accent bold">add_directory </text>
  <text x="160" y="468" class="green">/Users/me/monorepo/packages/ui</text>
  <text x="430" y="468" class="dim"> — has UI component patterns</text>
  <text x="14" y="488" class="dim">  └ </text>
  <text x="40" y="488" class="green">✓ Added packages/ui</text>
  <text x="195" y="488" class="dim"> │ </text>
  <text x="209" y="488" class="accent">AGENTS.md</text>
  <text x="289" y="488" class="dim">, </text>
  <text x="299" y="488" class="yellow">3 skills</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- Scene 4: Result — widget updated                               -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <text x="14" y="520" class="dim">  Widget updated: </text>
  <text x="150" y="520" class="text">📂</text>
  <text x="170" y="520" class="muted">2 external dirs</text>
  <text x="298" y="520" class="dim"> │ </text>
  <text x="314" y="520" class="text">shared-utils</text>
  <text x="416" y="520" class="dim">, </text>
  <text x="426" y="520" class="text">packages/ui</text>

  <!-- Cursor -->
  <text x="14" y="556" class="accent bold">❯</text>
  <rect x="28" y="545" width="8" height="16" fill="#60a5fa" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
